<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors connexion — Bibl'ESI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #f1f5f9;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 1.5rem;
      }
      .card {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .logo {
        width: 52px;
        height: auto;
        margin: 0 auto 1.25rem;
        display: block;
      }
      .icon {
        font-size: 2.75rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      p {
        color: #94a3b8;
        line-height: 1.65;
        margin-bottom: 1.75rem;
        font-size: 0.95rem;
      }
      button {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 0.75rem;
        padding: 0.75rem 1.75rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.png" alt="Bibl'ESI" class="logo" />
      <div class="icon">📶</div>
      <h1>Tu es hors connexion</h1>
      <p>
        Impossible de charger le catalogue pour l'instant.<br />
        Vérifie ta connexion internet et réessaie.
      </p>
      <button onclick="window.location.reload()">Réessayer</button>
    </div>
  </body>
</html>
